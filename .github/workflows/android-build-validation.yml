name: Android build validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/KarateClipRecorder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Test karate analyzer core
        run: gradle :karate-analyzer-core:test

      - name: Test MediaPipe hand adapter
        run: gradle :mediapipe-hand-adapter:test

      - name: Compile MediaPipe hand adapter Kotlin
        run: gradle :mediapipe-hand-adapter:compileDebugKotlin

      - name: Compile app Kotlin
        run: gradle :app:compileDebugKotlin
