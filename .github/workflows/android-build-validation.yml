name: Android build validation

on:
  pull_request:
    paths:
      - 'android/KarateClipRecorder/**'
      - '.github/workflows/android-build-validation.yml'
  push:
    branches: [ main ]

jobs:
  android-build-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/KarateClipRecorder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run Android validation
        run: |
          gradle --continue \
            :karate-analyzer-core:test \
            :mediapipe-hand-adapter:test \
            :mediapipe-hand-adapter:compileDebugKotlin \
            :app:testDebugUnitTest \
            :app:compileDebugKotlin
